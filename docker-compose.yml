services:

  postgres:
    image: postgres:18
    container_name: postgres-app
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORTS}"
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - data-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  ingestion:
    build:
      context: ./app/src/ingestion
      dockerfile: Dockerfile
    container_name: ingestion-app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - data-network
    volumes:
      - ./app/data:/app/data
    env_file:
      - .env
    environment:
      PG_HOST: ${POSTGRES_HOST}
      PG_PORT: ${POSTGRES_PORT}
      PG_DB: ${POSTGRES_DB}
      PG_USER: ${POSTGRES_USER}
      PG_PASSWORD: ${POSTGRES_PASSWORD}

  transform:
    container_name: dbt-transform
    build:
      context: ./app/src/incomes_dbt
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
        - ./app/src/incomes_dbt:/usr/app/dbt
        - ./app/src/incomes_dbt/profiles.yml:/root/.dbt/profiles.yml
    environment:
        - DBT_PROFILES_DIR=/root/.dbt
        - POSTGRES_DB=${POSTGRES_DB}
        - POSTGRES_HOST=${POSTGRES_HOST}
        - POSTGRES_USER=${POSTGRES_USER}
        - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
        - POSTGRES_PORT=${POSTGRES_PORT}
    depends_on:
      ingestion:
        condition: service_completed_successfully
    command: >
      sh -c "dbt run && dbt test"
    networks:
      - data-network

volumes:
  postgres_data:

networks:
  data-network: