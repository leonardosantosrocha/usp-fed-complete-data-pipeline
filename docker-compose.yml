x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: airflow/Dockerfile

  env_file:
    - .env

  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://admin:admin@postgres-app:5432/incomes_db
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW_UID: 50000
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags

  volumes:
    - ./app:/opt/app
    - ./airflow:/opt/airflow

  depends_on:
    - postgres


services:

  postgres:
    image: postgres:15
    container_name: postgres-app
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORTS}"
    volumes:
      - ./postgres-db-volume:/var/lib/postgresql/data


  airflow-init:
    <<: *airflow-common
    

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      - airflow-init


  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      - airflow-init
